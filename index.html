<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>打地鼠</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🐹 打地鼠</h1>
<p>分數：<span id="score">0</span></p>
<p>時間：<span id="time">10</span> 秒</p>

<div id="game">

  <div class="hole" onclick="hit(1)"></div>
  <div class="hole" onclick="hit(2)"></div>
  <div class="hole" onclick="hit(3)"></div>
  <div class="hole" onclick="hit(4)"></div>
  <div class="hole" onclick="hit(5)"></div>
</div>

<button onclick="start()">開始遊戲</button>

<script src="script.js"></script>
</body><img src="倉鼠.png" width="150">
